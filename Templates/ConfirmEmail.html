<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Email Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #0078D7;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h2>Hello {{FirstName}},</h2>
    <p>Thanks for registering. Please confirm your email by clicking the button below:</p>
    <p><a href="{{ConfirmationLink}}" class="btn">Confirm Email</a></p>
    <p>If you didn’t register, you can ignore this email.</p>
</body>
</html>
