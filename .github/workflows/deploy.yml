name: Containerized Enterprise Pipeline

on:
  push:
    branches:
      - master

jobs:
  # STAGE 1: Build Docker Image and Push to Azure Container Registry
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Log into your private Azure Container Registry using Docker
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 2. Build the Docker image from your Dockerfile and tag it with a unique version number
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/dotnetapp:${{ github.sha }} .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/dotnetapp:${{ github.sha }}

   # STAGE 2: Deploy Container to Staging Automatically
  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # FIXED: Added container username and password flags to resolve pull failures
    - name: Deploy Container to Azure Staging
      uses: azure/cli@v2
      with:
        inlineScript: |
          az webapp config container set \
            --name 'staginghybridapp' \
            --resource-group 'learning-dotnet-rg' \
            --container-image-name '${{ secrets.ACR_LOGIN_SERVER }}/dotnetapp:${{ github.sha }}' \
            --container-registry-url 'https://${{ secrets.ACR_LOGIN_SERVER }}' \
            --container-registry-user '${{ secrets.ACR_USERNAME }}' \
            --container-registry-password '${{ secrets.ACR_PASSWORD }}'

  # STAGE 3: Deploy Container to Production (Requires Manual Click)
  deploy-to-production:
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment: Production
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # FIXED: Added registry credentials for Production
    - name: Deploy Container to Azure Production
      uses: azure/cli@v2
      with:
        inlineScript: |
          az webapp config container set \
            --name 'hybridapp' \
            --resource-group 'learning-dotnet-rg' \
            --container-image-name '${{ secrets.ACR_LOGIN_SERVER }}/dotnetapp:${{ github.sha }}' \
            --container-registry-url 'https://${{ secrets.ACR_LOGIN_SERVER }}' \
            --container-registry-user '${{ secrets.ACR_USERNAME }}' \
            --container-registry-password '${{ secrets.ACR_PASSWORD }}'

